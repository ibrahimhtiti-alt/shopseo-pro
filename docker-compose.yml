version: "3.8"

services:
  shopseo-pro:
    build: .
    container_name: shopseo-pro
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # Persistente Daten (Backups, DB)
      - shopseo-data:/app/data
      # Google Credentials (falls vorhanden auf dem Host)
      # Dateiname muss mit dem GOOGLE_CREDENTIALS_PATH in .env übereinstimmen
      - ./google-credentials.json:/app/google-credentials.json:ro
    environment:
      - TZ=Europe/Berlin

volumes:
  shopseo-data:
